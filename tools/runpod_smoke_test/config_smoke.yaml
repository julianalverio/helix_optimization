# Smoke-test config used by tools/runpod_smoke_test/launch.py on the RunPod
# pod. Differs from config_ml.yaml in three places:
#   - manifest/examples paths point at the 10-example subset shipped by scp
#   - max_steps=2 (the smoke test only needs to prove fwd+bwd runs)
#   - batch_size=2 so pad_collate is exercised on real data
num_gpus: 1

manifest_path: tools/runpod_smoke_test/subset/module3_manifest.parquet
examples_root: tools/runpod_smoke_test/subset
cluster_path: tools/runpod_smoke_test/subset/helix_clusters.parquet
val_count: 1
seed: 0

batch_size: 2
num_workers: 0

max_steps: 2
max_epochs: -1
val_check_interval: 1.0

interacting_residue_mask_count_min: 1
interacting_residue_mask_count_max: 2
non_interface_residue_mask_rate: 0.25
max_zero_to_one_flip_rate: 0.20
max_one_to_zero_flip_rate: 0.20
positive_beta_mean: 0.75
positive_beta_confidence: 12.0
negative_beta_mean: 0.25
negative_beta_confidence: 12.0

c_s: 128
c_z: 64
pairformer_blocks: 4
n_heads_single: 4
n_heads_pair: 4
c_hidden_mul: 32
c_hidden_pair_att: 16
transition_n: 2
pairformer_dropout: 0.1
relpos_max_offset: 32

learning_rate: 0.001

helix_dihedral_weight: 1.0
interaction_bce_weight: 1.0
interaction_label_smoothing: 0.05

vdw_loss_weight: 1.0
hbond_loss_weight: 1.0
parallel_displaced_loss_weight: 1.0
sandwich_loss_weight: 1.0
t_shaped_loss_weight: 1.0

clash_loss_weight: 1.0
