module1_manifest_path: data/manifests/module1_manifest.parquet
local_mmcif_base_path: data
output_dir: data/module2

solvent_residues:
  waters: [HOH, DOD, H2O, WAT]
  cryoprotectants: [GOL, EDO, PEG, PG4, PGE, P6G, 1PE, 2PE, MPD]
  buffers: [SO4, PO4, ACT, CIT, TRS, DMS, IMD, FMT, EPE, MES, BTB, TAM, PIN, ACY]
  reductants: [BME, DTT, EDT]
  other_artifacts: [IPA, MLI, TLA, FLC, AZI, BEN, EOH, ACE]
  phasing_heavy_atoms: [HG, PT, AU, SM, SR, PBM, OS, LU, GD, EU, HO]

modified_residues_convert:
  MSE: {parent: MET, atom_renames: {SE: SD}}
  SEC: {parent: CYS, atom_renames: {SE: SG}}

modified_residues_drop_entry:
  [SEP, TPO, PTR, HYP, CSO, CSD, CSS, CSX, KCX, LLP, MLY, M3L, ALY, PYL, FME,
   TYS, CGU, PCA, OCS, CME, CAS]

allowed_cofactors:
  hemes: [HEM, HEC, HEA, HEB, HDD, VER]
  flavins: [FAD, FMN, FDA]
  nicotinamides: [NAD, NDP, NAP, NAI]
  pyridoxal: [PLP, PMP]
  nucleotides: [ATP, ADP, AMP, GTP, GDP, GMP, CTP, CDP, CMP, UTP, UDP, UMP,
                ACP, AGS, ANP, GNP, GSP]
  coenzymes: [COA, SAM, SAH, THF, BTN, TPP]
  iron_sulfur: [SF4, F3S, FES, FE2, FS2, CLF]
  metals: [ZN, MG, CA, FE, MN, CU, NI, CO, K, NA, FE3]
  chlorophylls: [CLA, CHL, BCL, BCB, BPH]

d_amino_acid_codes:
  [DAL, DLE, DTR, DVA, DCY, DAS, DGL, DHI, DIL, DPN, DLY, DSN, DTH, DTY,
   DAR, DGN, DPR, DSE]

min_observed_residues_per_chain: 20
max_unk_fraction_per_chain: 0.5
dssp_executable: mkdssp

modal_workers: 100
modal_cpu_per_worker: 1
modal_memory_mb: 2048
modal_batch_size: 10
modal_timeout_seconds: 600
modal_max_retries: 3
modal_retry_backoff_seconds: 30

test_mode: false
test_n_entries: 100
test_modal_workers: 5
test_modal_batch_size: 5
test_output_subdir: test_run
